---
title: Blog
---
<h1>All Posts</h1>
<ul style="margin: 0; padding: 0; list-style-type: none;">
    {% for post in site.posts %}
        <li>
            <h2 style="margin: 0;"><a href="{{ post.url }}">{{ post.title }}</a></h2>
            <small>{{ post.date | date: "%B %d, %Y" }}</small>
            {{ post.excerpt }}
        </li>
    {% endfor %}
</ul>
